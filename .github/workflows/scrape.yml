name: Scrape Philadelphia Cultural Events

on:
  workflow_dispatch:
  schedule:
    # Run daily at 8 AM ET (noon UTC)
    - cron: '0 12 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run tests
        run: python -m unittest scraper.test_scraper -v

      - name: Run scraper
        run: python scraper/scrape_events.py
        continue-on-error: true

      - name: Validate events.json
        id: check
        run: |
          if [ ! -f data/events.json ]; then
            echo "ERROR: data/events.json not found after scraping!"
            echo "event_count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          EVENT_COUNT=$(python3 -c "import json; print(len(json.load(open('data/events.json')).get('events',[])))")
          echo "Events in data/events.json: $EVENT_COUNT"
          echo "event_count=$EVENT_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$EVENT_COUNT" -eq 0 ]; then
            echo "::warning::No events in events.json. Fallback in app.js will be used."
          fi

      - name: Commit updated events
        if: steps.check.outputs.event_count != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json data/sources.json
          git diff --staged --quiet || git commit -m "data: update event listings $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

  deploy:
    needs: scrape
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - run: git pull origin main

      - name: Prepare deploy directory
        run: |
          mkdir -p _site
          cp index.html _site/
          cp manifest.json _site/ 2>/dev/null || true
          cp -r assets _site/
          cp -r data _site/
          echo "=== Deploy contents ==="
          find _site -type f

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - id: deployment
        uses: actions/deploy-pages@v4
